<html>
    <head>
        <title>Statistiques</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <a href="./index.html">Accueil</a>
        <h1>Statistiques</h1>
        <div id="conteneur-tableaux">
            
            <table id="mediums">
                <tr>
                    <td colspan="3">Top 5 Mediums</td>
                </tr>
                <tr>
                    <td></td>
                    <td>Nom Prenom</td>
                    <td>Nombre consultations</td>
                </tr>                  
            </table>
            
            <table>
                <tr>                    
                    <td>Nombre consultations/médium:</td>
                    <td id="nombre"></td>
                </tr>
                <tr>
                    <td colspan="2">Répartition Clients par Employés:</td>
                </tr>
                <tr>
                    <td colspan = "2"> <div id="graphe" class="chart"></div> </td>
                </tr>
            </table>
           
            
            <table id="pigeons">
                <tr>
                    <td colspan="3">Top 5 Pigeons Clients</td>
                </tr>
                <tr>
                    <td> </td>
                    <td>Nom Prenom</td>
                    <td>Nombre consultations </td>
                </tr>                  
            </table>
        </div>
        
        <script>
            function initPage() {
                console.log("Initialisation de la page");
                visualiserStatistiques();
            };
            
            async function visualiserStatistiques() {
                console.log("Appel de l'Action : visualiser statistiques");
                let url = './ActionServlet?todo=visualiser-statistiques';
                let jsonResponse = await fetch(url)
                        .then(
                            function(httpResponse) {
                                return httpResponse.json();
                            }
                        )
                        .catch(
                            function(error) {
                                console.log(error);
                                return null;
                            }
                        );
                console.log(jsonResponse);
                if (jsonResponse) {
                    console.log("Affichage des statistiques");
                    
                    // Affichage Top 5 Mediums
                    let mediums = jsonResponse.mediums;
                    console.log(mediums);
                    let tableMediums = document.getElementById("mediums");
                    for (let medium of mediums) {
                        let row = document.createElement("tr");   
                        let tdImage = document.createElement("td");
                        let image = document.createElement("img");
                        image.src = "images/profil.png";
                        image.alt = "Logo profil";
                        image.width = 20;
                        tdImage.appendChild(image);
                        row.appendChild(tdImage);
                        let tdMedium = document.createElement("td");
                        tdMedium.textContent = medium.denomination;
                        row.appendChild(tdMedium);
                        let tdNbConsultations = document.createElement("td");
                        tdNbConsultations.textContent = medium.nbConsultations;
                        row.appendChild(tdNbConsultations);
                        tableMediums.appendChild(row);
                    }
                    
                    // Affichage nombre total consultations
                    let moyenne = jsonResponse.moyenneConsMedium;
                    document.getElementById("nombre").textContent = moyenne;
                    
                    // Affichage distribution employés
                    let employes = jsonResponse.employes;
                    console.log(employes);
                    let tableEmployes = document.getElementById("employes");
                    for (let employe of employes) {
                        
                    }
                    
                    // Affichage Top 5 Clients
                    let clients = jsonResponse.clients;
                    console.log(clients);
                    let tableClients = document.getElementById("pigeons");
                    for (let client of clients) {
                        let row = document.createElement("tr");
                        let tdImage = document.createElement("td");
                        let image = document.createElement("img");
                        image.src = "images/profil.png";
                        image.alt = "Logo profil";
                        image.width = 20;
                        tdImage.appendChild(image);
                        row.appendChild(tdImage);
                        let tdClient = document.createElement("td");
                        tdClient.textContent = client.prenom + " " + client.nom;
                        row.appendChild(tdClient);
                        let tdNbConsultationsClient = document.createElement("td");
                        tdNbConsultationsClient.textContent = client.nbConsultations;
                        row.appendChild(tdNbConsultationsClient);
                        tableClients.appendChild(row);
                    }
                }
            }

            window.onload = initPage;
        </script>
    </body>
</html>
