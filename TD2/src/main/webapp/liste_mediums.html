<html>
    <head>
        <title>Liste mediums</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <h1>Liste mediums</h1>
        <div id="message-rdv"></div>
        <table id="liste-mediums"></table>
        <script>
            function initPage() {
                console.log("Initialisation de la page");
                listerMediums();
            };
            
            async function listerMediums() {
                console.log("Appel de l'Action: Consulter liste mediums");
                let url = './ActionServlet?todo=consulter-liste-mediums'; // TODO : appeler l'ActionServlet pour lister les demandes
                let jsonResponse = await fetch(url)
                        .then(
                            function(httpResponse) {
                                return httpResponse.json();
                            }
                        )
                        .catch(
                            function(error) {
                                console.log(error);
                                return null;
                            }
                        );
                console.log(jsonResponse);
                if (jsonResponse) {
                    console.log('Affichage de la liste de mediums');
                    // TODO : afficher les demandes
                    let mediums = jsonResponse.mediums;
                    const table = document.getElementById("liste-mediums");
                    for (let medium of mediums) {
                        console.log(medium.denomination, medium.genre, medium.presentation);
                        const cell = document.createElement("tr");
                        
                        //première ligne = nom + profession
                        const trM = document.createElement("tr");
                        const tdMedium = document.createElement("td");
                        tdMedium.textContent = medium.denomination;
                        trM.appendChild(tdMedium);
                        const tdProfession = document.createElement("td");
                        tdProfession.textContent = medium.profession;
                        trM.appendChild(tdProfession);
                        cell.appendChild(trM);
                        
                        //deuxième ligne = description
                        const trD = document.createElement("tr");
                        const tdDescription = document.createElement("td");
                        tdDescription.setAttribute("colspan",2);
                        tdDescription.textContent = medium.presentation;
                        trD.appendChild(tdDescription);
                        cell.appendChild(trD);
                        
                        let connecte = jsonResponse.connecte;
                        if (connecte === true) {
                            //troisième ligne = bouton prendre rdv
                            const trB = document.createElement("tr");
                            const tdBouton = document.createElement("td");
                            tdBouton.setAttribute("colspan",2);
                            const boutonRdv = document.createElement("button");
                            boutonRdv.textContent = "Prendre rendez-vous";
                            boutonRdv.dataset.idMedium=medium.id;
                            boutonRdv.addEventListener("click",commencerConsultation);

                            tdBouton.appendChild(boutonRdv);
                            trB.appendChild(tdBouton);
                            cell.appendChild(trB);
                        }
                        
                        
                        
                        table.appendChild(cell);
                    }
                    
                    
                    
                }
            }
            
            async function commencerConsultation(event) {
                console.log("Appel de l'Action: commencer consultation");
                let bouton = event.target;
                let idMedium = bouton.dataset.idMedium;
                let url = './ActionServlet?todo=commencer-consultation'+'&medium='+encodeURIComponent(idMedium);
                let jsonResponse = await fetch(url)
                        .then(
                            function(httpResponse) {
                                return httpResponse.json();
                            }
                        )
                        .catch(
                            function(error) {
                                console.log(error);
                                return null;
                            }
                        );
                console.log(jsonResponse);
                if (jsonResponse) {
                    console.log('Début de la consultation');
                    let consultation = jsonResponse.consultation;
                    let message = document.getElementById("message-rdv");
                    if (consultation === true) {
                        console.log("Création de la consultation réussie");
                        message.textContent = "Votre demande de rendez-vous a bien été prise en compte. Veuillez attendre que le médium demandé soit disponible.";
                    } else {
                        console.log("La consultation n'a pas été créée");
                        message.textContent = "Votre demande de rendez-vous a échouée. Veuillez réessayer ultérieurement.";
                    }
                    
                }
            }
            
            window.onload = initPage;
        </script>
    </body>
</html>
