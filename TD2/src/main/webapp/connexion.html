    <body>
        <header>
            <nav class="navbar">
                <a href="./index.html" class="nav-item">Accueil</a>
                <a href="./liste_mediums.html" class="nav-item">Mediums</a>

                <a href="./connexion.html" class="nav-item">Connexion</a>
                <a href="./inscription.html" class="nav-item">Inscription</a>
            </nav>
        </header>
        <h1>Connexion</h1>
        <div id="message-erreur">Veuillez vérifier vos identifiants et réessayez.</div>
        <table>
            <tr>
                <th>
                    Adresse mail :
                </th>
                <td>
                    <input type="text" id="login" name="login" />
                </td>
            </tr>

            <tr>
                <th>
                    Mot de passe :
                </th>
                <td>
                    <input type="password" id="password" name="password" size="20" />
                </td>
            </tr>

            <tr>
                <td colspan="2">
                    <button id="bouton-connexion">Connexion</button>
                </td>
            </tr>
            <tr>
                <td colspan="2">
                    <a href="./inscription.html"> Pas encore de compte ? </a>
                </td>
            </tr>
        </table>
        
        <footer>
            <div class="footer-left">
                <p>PREDICT'IF</p>
                <p>INSA Lyon, 31 Avenue Jean Capelle</p>
                <p>69621, Villeurbanne</p>
            </div>
            <div class="footer-separator"></div>
            <div class="footer-right">
                <p>CONTACTS</p>
                <p>contact@predictif.arnaque</p>
                <p>07 68 95 11 60</p>
            </div>
        </footer>

        
        <script>
            function initPage() {
                console.log("Initialisation de la page");
                document.getElementById('bouton-connexion').addEventListener('click', function() {
                    console.log("Click sur le bouton 'Connexion'");
                    connexion();
                });
                document.addEventListener('keydown', function(event) {
                    if (event.key === 'Enter') {
                        connexion();
                    }
                });
            };
            
            async function connexion() {
                console.log("Appel de l'Action: Connexion");
                let login = document.getElementById("login").value;
                let password = document.getElementById("password").value;
                let url = './ActionServlet?todo=connexion'+'&login='+encodeURIComponent(login)+'&password='+encodeURIComponent(password); // TODO : appeler l'ActionServlet pour lister les demandes
                let jsonResponse = await fetch(url)
                        .then(
                            function(httpResponse) {
                                return httpResponse.json();
                            }
                        )
                        .catch(
                            function(error) {
                                console.log(error);
                                return null;
                            }
                        );
                console.log(jsonResponse);
                if (jsonResponse) {
                    let connexion  = jsonResponse.connexion;
                    if (connexion === false){
                        console.log("reessayer avec un autre mdp");
                        document.getElementById("message-erreur").style.visibility = "visible";
                    }else{
                        console.log('Affichage de identifiant');
                        document.getElementById("message-erreur").style.visibility = "hidden";
                        let identifiant = jsonResponse.id;
                        console.log(identifiant);
                        if (jsonResponse.type === "client") {
                            window.location.href = "./profil.html";
                        }
                        else {
                            window.location.href = "./index.html";
                        }
                    }
                    
                    
                    
                    
                }
            }
            window.onload = initPage;
        </script>
