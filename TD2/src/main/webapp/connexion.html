            .navbar {

            .nav-item {
                display: inline-flex;

            table {

                border-radius: 12px;

            #bouton-connexion:hover {

            table a {

            footer {

            .footer-left,

    <body>
        <header>
            <nav class="navbar">
                <a href="./index.html" class="nav-item">Accueil</a>
                <a href="./liste_mediums.html" class="nav-item">Mediums</a>
                <div class="nav-spacer"></div>
                <a href="./connexion.html" class="nav-item">Connexion</a>
                <a href="./inscription.html" class="nav-item">Inscription</a>
            </nav>
        </header>
        <h1>Connexion</h1>
        <div id="message-erreur">Veuillez vérifier vos identifiants et réessayez.</div>
        <table>
            <tr>
                <th>
                    Adresse mail :
                </th>
                <td>
                    <input type="text" id="login" name="login" />
                </td>
            </tr>

            <tr>
                <th>
                    Mot de passe :
                </th>
                <td>
                    <div style="position: relative; display: inline-block;">
                        <input type="password" id="password" />
                        <button type="button" onclick="toggleMdp('password', this)" style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #edd4be;">
                            <svg data-state="visible" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.641 0-8.573-3.007-9.964-7.178Z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                            </svg>
                        </button>
                    </div>
                </td>
            </tr>

            <tr>
                <td colspan="2">
                    <button id="bouton-connexion">Connexion</button>
                </td>
            </tr>
            <tr>
                <td colspan="2">
                    <a href="./inscription.html"> Pas encore de compte ? </a>
                </td>
            </tr>
        </table>
        
        <footer>
            <div class="footer-left">
                <p>PREDICT'IF</p>
                <p>INSA Lyon, 31 Avenue Jean Capelle</p>
                <p>69621, Villeurbanne</p>
            </div>
            <div class="footer-separator"></div>
            <div class="footer-right">
                <p>CONTACTS</p>
                <p>contact@predictif.arnaque</p>
                <p>07 68 95 11 60</p>
            </div>
        </footer>

        
        <script>
            function initPage() {
                console.log("Initialisation de la page");
                document.getElementById('bouton-connexion').addEventListener('click', function() {
                    console.log("Click sur le bouton 'Connexion'");
                    connexion();
                });
                document.addEventListener('keydown', function(event) {
                    if (event.key === 'Enter') {
                        connexion();
                    }
                });
            };
            
            const SVG_EYE = `<svg data-state="visible" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.641 0-8.573-3.007-9.964-7.178Z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
            </svg>`;

            const SVG_EYE_SLASH = `<svg data-state="hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
            </svg>`;

            function toggleMdp(inputId, bouton) {
                let input = document.getElementById(inputId);
                let svg = bouton.querySelector("svg");
                if (svg.dataset.state === "visible") {
                    input.type = "text";
                    bouton.innerHTML = SVG_EYE_SLASH;
                } else {
                    input.type = "password";
                    bouton.innerHTML = SVG_EYE;
                }
            }
            
            async function connexion() {
                console.log("Appel de l'Action: Connexion");
                let param = {
                    login: document.getElementById("login").value,
                    password: document.getElementById("password").value
                };
                let options = {method:"POST", body: new URLSearchParams(param)};
                let url = './ActionServlet?todo=connexion';
                let jsonResponse = await fetch(url, options)
                        .then(
                            function(httpResponse) {
                                return httpResponse.json();
                            }
                        )
                        .catch(
                            function(error) {
                                console.log(error);
                                return null;
                            }
                        );
                console.log(jsonResponse);
                if (jsonResponse) {
                    let connexion  = jsonResponse.connexion;
                    if (connexion === false){
                        console.log("reessayer avec un autre mdp");
                        document.getElementById("message-erreur").style.visibility = "visible";
                    }else{
                        console.log('Affichage de identifiant');
                        document.getElementById("message-erreur").style.visibility = "hidden";
                        let identifiant = jsonResponse.id;
                        console.log(identifiant);
                        if (jsonResponse.type === "client") {
                            window.location.href = "./profil.html";
                        }
                        else {
                            window.location.href = "./index.html";
                        }
                    }
                    
                    
                    
                    
                }
            }
            window.onload = initPage;
        </script>
    </body>
</html>
