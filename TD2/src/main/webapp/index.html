<!DOCTYPE html>
<html>
    <head>
        <title>Accueil</title>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    </head>
    <body>
        <h1>PREDICT'IF</h1>
        <div id="lien-connexion"></div>
        <div id="lien-mediums"></div>
        <div id="lien-consultation"></div>
        <div id="lien-deconnexion"></div>
        
        <script>
            async function verifierConnexion() {
                let url = './ActionServlet?todo=verifier-connexion';
                let jsonResponse = await fetch(url)
                        .then(
                            function(httpResponse) {
                                return httpResponse.json();
                            }
                        )
                        .catch(
                            function(error) {
                                console.log(error);
                                return null;
                            }
                        );
                console.log(jsonResponse);

                if (jsonResponse.connexion === true) {
                    if (jsonResponse.type === "employe") {
                        let lien = document.createElement("a");
                        lien.href="./demarrer_consultation.html";
                        lien.textContent = "Ma consultation";
                        document.getElementById("lien-consultation").appendChild(lien);
                    } else {
                        let lien = document.createElement("a");
                        lien.href="./liste_mediums.html";
                        lien.textContent = "Mediums";
                        document.getElementById("lien-mediums").appendChild(lien);
                    }
                    let bouton = document.createElement("button");
                    bouton.textContent = "Deconnexion";
                    bouton.setAttribute("id","bouton-deconnexion");
                    document.getElementById("lien-deconnexion").appendChild(bouton);
                    document.getElementById('bouton-deconnexion').addEventListener('click', function() {
                        console.log("Click sur le bouton 'Deconnexion'");
                        deconnexion();
                    });
                }
                else {
                    let lienC = document.createElement("a");
                    lienC.href="./connexion.html";
                    lienC.textContent = "Connexion";
                    document.getElementById("lien-connexion").appendChild(lienC);
                    
                    let lienM = document.createElement("a");
                    lienM.href="./liste_mediums.html";
                    lienM.textContent = "Mediums";
                    document.getElementById("lien-mediums").appendChild(lienM);
                }
        }
        
        async function deconnexion() {
            console.log("Appel de l'Action: Deconnexion");
                let url = './ActionServlet?todo=deconnexion';
                let jsonResponse = await fetch(url)
                        .then(
                            function(httpResponse) {
                                return httpResponse.json();
                            }
                        )
                        .catch(
                            function(error) {
                                console.log(error);
                                return null;
                            }
                        );
                console.log(jsonResponse);
                if (jsonResponse) {
                    let deconnexion  = jsonResponse.deconnexion;
                    if (deconnexion === false){
                        console.log("deconnexion a échoué");
                    }else{
                        console.log("deconnexion ok");
                        window.location.href = "./index.html";
                        verifierConnexion();
                    }
                    
                    
                    
                    
                }
        }

        window.onload = verifierConnexion;
        </script>
    </body>
</html>
