<!DOCTYPE html>
<html>
    <head>
        <title>Accueil</title>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
        
        <style>
            body {
                margin: 0;
                font-family: Arial;
                background-image: url("./images/fond.png");
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
            }

            header {
                background-color: #163763;
                padding: 10px 20px;
                border-bottom: 2px solid #edd4be;
            }

            .navbar {
                background-color: #163763;
                padding: 10px 20px;
                gap: 40px;
                align-items: center;
                display: flex;
                width: 100%;
                justify-content: space-evenly;
            }

            .nav-item {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                background-color: #10294a;
                color: #edd4be;
                padding: 8px 14px;
                border-radius: 6px;
                text-decoration: none;
                font-weight: bold;
                border: none;
                cursor: pointer;
                transition: 0.2s;
                font: inherit;
                line-height: normal;
                position: relative;
            }

            .nav-item:hover {
                transform: translateY(-1px);
                text-decoration: underline;
            }

            /* ---- Section héro ---- */
            #hero {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 60px 20px 40px;
                text-align: center;
            }
            @font-face {
                font-family: "Bell MT";
                src: url("./fonts/bell-mt-italic.ttf") format("truetype");
                font-style: italic;
                font-weight: normal;
            }

            #hero h1 {
                font-size: 5.5rem;
                color: #edd4be;
                margin-bottom: 0px;
                margin-top: 0px;
                font-family: "Bell MT", serif;
                font-style: italic;
                text-shadow:
                -2px -2px 0 #997c62,
                 2px -2px 0 #997c62,
                -2px  2px 0 #997c62,
                 2px  2px 0 #997c62;
            }
            
            #hero h2 {
                font-size: 2.5rem;
                color: #edd4be;
                text-shadow: 0 0 10px rgba(227, 187, 152, 0.8);
                margin-bottom: 30px;
                margin-top: 0px;
                font-family: "Bell MT", serif;
                font-style: italic;
            }

            #hero p {
                font-size: 1.5rem;
                color: #edd4be;
                margin-bottom: 0px;
                margin-top: 5px;
                font-family: "Bell MT", serif;
            }


            footer {
                margin-top: 40px;
                background-color: #163763;
                box-sizing: border-box;
                display: flex;
                justify-content: center;
                align-items: stretch;
                gap: 40px;
                border-top: 2px solid #edd4be;
                color: #edd4be;
            }

            .footer-left,
            .footer-right {
                width: 630px;
            }

            .footer-separator {
                width: 2px;
                background-color: #edd4be;
                height: auto;
            }
            .nav-spacer {
                width: 400px;
            }
        </style>
    </head>
    <body>
        <header>
            <nav class="navbar">
            </nav>
        </header>
        <div id="hero">
            <h1>PREDICT'IF</h1>
            <h2>Découvrez ce que le destin vous réserve</h2>
            <p>🔮 Consultations personnalisées</p>
            <p>🌙 Médiums certifiés</p>
            <p>🛡️ 100% confidentiel</p>
            <p>⏱️ Disponible 24h/24</p>
        </div>

        <footer>
            <div class="footer-left">
                <p>PREDICT'IF</p>
                <p>INSA Lyon, 31 Avenue Jean Capelle</p>
                <p>69621, Villeurbanne</p>
            </div>
            <div class="footer-separator"></div>
            <div class="footer-right">
                <p>CONTACTS</p>
                <p>contact@predictif.arnaque</p>
                <p>07 68 95 11 60</p>
            </div>
        </footer>
        
        <script>
            let navbar = document.querySelector(".navbar");
            async function verifierConnexion() {
                let url = './ActionServlet?todo=verifier-connexion';
                let jsonResponse = await fetch(url)
                        .then(
                            function(httpResponse) {
                                return httpResponse.json();
                            }
                        )
                        .catch(
                            function(error) {
                                console.log(error);
                                return null;
                            }
                        );
                console.log(jsonResponse);
                
                addLink("./index.html", "Accueil");
                
                if (jsonResponse.connexion === true) {

                    if (jsonResponse.type === "employe") {
                        addLink("./demarrer_consultation.html", "Ma consultation");
                        addLink("./statistiques.html", "Statistiques");
                        addLink("./carte.html", "Carte clients");
                    } else {
                        addLink("./liste_mediums.html", "Mediums");
                        addLink("./historique.html", "Historique");
                        addLink("./profil.html", "Profil Astral");
                    }

                    addButton("Déconnexion", deconnexion);

                } else {
                    addLink("./liste_mediums.html", "Mediums");
                    let space = document.createElement("div");
                    space.className = "nav-spacer";
                    navbar.appendChild(space);
                    addLink("./connexion.html", "Connexion");
                    addLink("./inscription.html", "Inscription");
                }
            }
        
            async function deconnexion() {
                console.log("Appel de l'Action: Deconnexion");
                let url = './ActionServlet?todo=deconnexion';
                let jsonResponse = await fetch(url)
                        .then(
                            function(httpResponse) {
                                return httpResponse.json();
                            }
                        )
                        .catch(
                            function(error) {
                                console.log(error);
                                return null;
                            }
                        );
                console.log(jsonResponse);
                if (jsonResponse) {
                    let deconnexion  = jsonResponse.deconnexion;
                    if (deconnexion === false){
                        console.log("deconnexion a échoué");
                    }else{
                        console.log("deconnexion ok");
                        window.location.href = "./index.html";
                        verifierConnexion();
                    }
                }
            }

            function addLink(href, text) {
                const a = document.createElement("a");
                a.href = href;
                a.textContent = text;
                a.className = "nav-item";
                navbar.appendChild(a);
            }

            function addButton(text, onClick) {
                const b = document.createElement("button");
                b.textContent = text;
                b.className = "nav-item";
                b.onclick = onClick;
                navbar.appendChild(b);
            }

            window.onload = verifierConnexion;
        </script>
    </body>
</html>
