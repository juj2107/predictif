<html>
    <head>
        <title>Carte client</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <a href="./index.html">Accueil</a>
        <div id="conteneur-tableaux">
            <div id="map" style="height: 600px; width: 600px; margin: 0 auto;"></div>
            <table>
                <tr>
                    <td colspan="2">Profil du client</td>
                </tr>
                <tr>
                    <th>Adresse postale :</th>
                    <td><input readonly id="adresse"></td>
                </tr>
                <tr>
                    <th>Nom :</th>
                    <td><input readonly id="nom"></td>
                </tr>
                <tr>
                    <th>Prenom :</th>
                    <td><input readonly id="prenom"></td>
                </tr>
            </table>
            
            <div id="message">Veuillez client sur un point de la carte pour avoir les informations d'un client.</div>

        </div>
        
        <script>
            function initPage() {
                console.log("Initialisation de la page");
                initMap();
            };
            
            let googleMapInstance = null;
            let markers = [];
            let selectedMarker = null;

            function initMap() {

                googleMapInstance = new google.maps.Map(document.getElementById('map'), {
                    center: {lat: 46.954695, lng: 2.505753},
                    zoom: 6
                });

                loadClients();
            }

            async function loadClients() {
                console.log("Appel de l'Action : afficher clients sur la carte");
                let url = './ActionServlet?todo=afficher-clients-carte';
                let jsonResponse = await fetch(url)
                        .then(
                            function(httpResponse) {
                                return httpResponse.json();
                            }
                        )
                        .catch(
                            function(error) {
                                console.log(error);
                                return null;
                            }
                        );
                console.log(jsonResponse);
                if (jsonResponse) {
                    console.log("Affichage des clients sur la carte");
                    let clients = jsonResponse.clients;
                    for (let client of clients) {
                        createClientMarker(client);
    }
                }
            }
            function createClientMarker(client) {

                let marker = new google.maps.Marker({
                    map: googleMapInstance,
                    position: {
                        lat: client.latitude,
                        lng: client.longitude
                    },
                    title: client.prenom + " " + client.nom,
                    icon: {url:"./images/black-pin.png",scaledSize: new google.maps.Size(30, 40)}
                });

                marker.clientData = client;

                marker.addListener("click", function () {
                    selectClientMarker(marker);
                });

                markers.push(marker);
            }
            
            function selectClientMarker(marker) {

                // remettre ancien marker normal
                if (selectedMarker) {
                    selectedMarker.setIcon({url:"./images/black-pin.png",scaledSize: new google.maps.Size(30, 40)});
                }

                // nouveau marker sélectionné
                marker.setIcon({url:"./images/red-pin.png",scaledSize: new google.maps.Size(30, 40)});
                selectedMarker = marker;

                // remplir le tableau
                document.getElementById("adresse").value = marker.clientData.adresse;
                document.getElementById("nom").value = marker.clientData.nom;
                document.getElementById("prenom").value = marker.clientData.prenom;

                // cacher message
                document.getElementById("message").style.display = "none";
            }

            window.onload = initPage;
        </script>
        <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAhf3JleYpal9S-xouJYH8lf7Dvz5Y2Nko">
        </script>
    </body>
</html>
